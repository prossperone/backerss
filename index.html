<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backerss — Protocolo de Ejecución</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0B0A;
    --bg-raised: #141312;
    --ink: #F1EDE2;
    --ink-dim: #A39C8A;
    --ink-faint: #5C574A;
    --gold: #D4AF37;
    --gold-bright: #F0CC5B;
    --gold-dim: #4A3B14;
    --green: #3FA66A;
    --green-dim: #1E4A30;
    --line: #2A2722;
    --line-bright: #3D3829;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(212,175,55,0.10), transparent),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
    color: var(--ink);
    font-family: 'Archivo', sans-serif;
    line-height: 1.5;
    overflow-x: hidden;
  }

  .mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.02em; }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 0.6em;
  }
  .eyebrow::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--gold);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  a { color: inherit; text-decoration: none; }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 28px; }

  /* ---------- NAV ---------- */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    background: rgba(11,11,10,0.82);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  nav .wrap { display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .logo { font-family: 'Archivo Black', sans-serif; font-size: 1.05rem; letter-spacing: -0.01em; color: var(--gold); }
  .logo .s { color: var(--ink); }
  .nav-cta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.74rem; letter-spacing: 0.04em; text-transform: uppercase;
    border: 1px solid var(--line-bright);
    padding: 9px 16px; border-radius: 2px;
    transition: all 0.2s ease;
  }
  .nav-cta:hover { border-color: var(--gold); color: var(--gold); }

  /* ---------- HERO ---------- */
  .hero { padding: 168px 0 110px; position: relative; overflow: hidden; }

  #financeCanvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none; opacity: 0.55;
  }
  .hero .wrap { position: relative; z-index: 1; }
  .hero::after {
    content: ''; position: absolute; inset: 0; z-index: 0;
    background: linear-gradient(180deg, transparent 0%, transparent 60%, var(--bg) 100%);
    pointer-events: none;
  }

  .hero-tag { margin-bottom: 28px; }

  h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    line-height: 1.05;
    letter-spacing: -0.01em;
    max-width: 920px;
    color: var(--ink);
  }
  h1 .accent { color: var(--gold); }

  .hero-sub {
    margin-top: 26px;
    font-size: 1.15rem;
    color: var(--ink-dim);
    max-width: 600px;
    line-height: 1.6;
  }

  .hero-actions {
    margin-top: 42px;
    display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
  }

  .btn-primary {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.84rem; letter-spacing: 0.04em; text-transform: uppercase;
    background: var(--gold);
    color: #0B0B0A;
    font-weight: 600;
    padding: 16px 28px;
    border-radius: 2px;
    display: inline-flex; align-items: center; gap: 10px;
    transition: all 0.2s ease;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(212,175,55,0.25); }
  .btn-primary svg { width: 14px; height: 14px; transition: transform 0.2s ease; }
  .btn-primary:hover svg { transform: translateX(3px); }

  .btn-secondary {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--ink-dim);
    border-bottom: 1px solid var(--line-bright);
    padding-bottom: 3px;
    transition: all 0.2s ease;
  }
  .btn-secondary:hover { color: var(--gold); border-color: var(--gold); }

  .hero-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.76rem; color: var(--ink-faint); letter-spacing: 0.02em; }
  .hero-video-note { margin-top: 14px; font-family: 'JetBrains Mono', monospace; font-size: 0.74rem; color: var(--ink-faint); }

  /* ---------- TICKER ---------- */
  .ticker-band {
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: var(--bg-raised);
    overflow: hidden; white-space: nowrap; padding: 13px 0;
  }
  .ticker-track { display: inline-flex; animation: ticker 32s linear infinite; }
  .ticker-track span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem; color: var(--ink-faint);
    letter-spacing: 0.05em; padding: 0 2.2em; text-transform: uppercase;
  }
  .ticker-track span.gold-mk { color: var(--gold); }
  .ticker-track span.green-mk { color: var(--green); }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ---------- SECTION SHARED ---------- */
  section { padding: 110px 0; }
  .section-line { border-top: 1px solid var(--line); }
  .eyebrow-block { margin-bottom: 22px; }

  h2 {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(1.7rem, 3.4vw, 2.5rem);
    line-height: 1.12;
    max-width: 760px;
    letter-spacing: -0.005em;
    color: var(--ink);
  }

  .lede { margin-top: 20px; font-size: 1.05rem; color: var(--ink-dim); max-width: 640px; line-height: 1.7; }

  /* ---------- RIESGO BAJO (stat strip) ---------- */
  .risk-strip {
    margin-top: 56px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border: 1px solid var(--line);
  }
  .risk-cell {
    padding: 30px 28px;
    border-left: 1px solid var(--line);
  }
  .risk-cell:first-child { border-left: none; }
  .risk-num {
    font-family: 'Archivo Black', sans-serif;
    font-size: 2.3rem;
    color: var(--gold);
    line-height: 1;
  }
  .risk-num.green { color: var(--green); }
  .risk-label {
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.74rem;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1.5;
  }

  /* ---------- MIEDO REAL ---------- */
  .fear-block {
    margin-top: 40px;
    padding: 30px 34px;
    border: 1px solid var(--line-bright);
    background: var(--bg-raised);
    border-left: 3px solid var(--gold);
  }
  .fear-block p { font-size: 1.04rem; color: var(--ink); line-height: 1.75; }
  .fear-block p + p { margin-top: 14px; color: var(--ink-dim); }
  .fear-block strong { color: var(--gold); }

  /* ---------- BAÑO DE REALIDAD ---------- */
  .reality {
    background: var(--bg-raised);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .reality-inner { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 60px; align-items: center; }
  .reality blockquote {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(1.4rem, 2.4vw, 1.95rem);
    line-height: 1.34;
    letter-spacing: -0.005em;
    color: var(--ink);
  }
  .reality blockquote .gold-q { color: var(--gold); }
  .reality-cap {
    margin-top: 28px; font-size: 1rem; color: var(--ink-dim); line-height: 1.65;
    border-left: 2px solid var(--green); padding-left: 18px;
  }
  .reality-side {
    font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--ink-faint);
    border: 1px solid var(--line-bright); padding: 26px; line-height: 1.9;
  }
  .reality-side .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--line); }
  .reality-side .row:last-child { border-bottom: none; }
  .reality-side .row span:last-child { color: var(--ink); }
  .reality-side .row.flag span:last-child { color: var(--gold); }

  /* ---------- CURIOSITY HOOK ---------- */
  .hook { text-align: center; }
  .hook h2 { margin: 0 auto; max-width: 720px; }
  .hook .lede { margin: 20px auto 0; text-align: center; }

  .flow-visual { margin: 70px auto 0; max-width: 760px; position: relative; height: 96px; }
