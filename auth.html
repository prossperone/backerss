<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backerss — Iniciar Protocolo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="auth-section">
    <div class="auth-container">
      <div class="logo" style="font-size: 1.4rem; margin-bottom: 12px;">BACKER<span class="s">SS</span></div>
      <h2>Iniciar Protocolo</h2>
      <form action="dashboard.html" method="GET" onsubmit="return true;">
        <div class="input-group">
          <label>Identificador / Email</label>
          <input type="email" required placeholder="usuario@backerss.com">
        </div>
        <div class="input-group">
          <label>Clave de Acceso</label>
          <input type="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">
          Acceder al Dashboard
        </button>
      </form>
      <div>
        <a href="index.html" class="auth-back">← Volver a la Landing</a>
      </div>
    </div>
  </section>
</body>
</html>
