<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backerss — Dashboard Academia</title>
  <link rel="icon" type="image/png" href="favicon.png">
  
  <style>
    :root {
      --bg-main: #0B0B0A;
      --bg-card: #141412;
      --accent: #E5C158;
      --text-primary: #F5F5F3;
      --text-muted: #8A8A85;
      --border: #262622;
      --success: #3EE587;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      line-height: 1.25;
      padding: 20px;
    }

    .mono {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    header {
      max-width: 800px;
      margin: 0 auto 30px auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }

    h1 {
      font-size: 1.5rem;
      letter-spacing: -0.5px;
    }

    .vault-chip {
      background: #1A1A16;
      border: 1px solid var(--accent);
      padding: 8px 16px;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .vault-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .vault-amount {
      font-size: 1.2rem;
      color: var(--accent);
      font-weight: bold;
    }

    .dashboard-layout {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    /* --- NUEVO: ESTILOS PARA TU ARSENAL DE MATERIALES --- */
    .arsenal-box {
      background: var(--bg-card);
      border: 1px solid rgba(229, 193, 88, 0.25);
      border-radius: 12px;
      padding: 20px;
    }
    .arsenal-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 12px;
      font-weight: bold;
    }
    .arsenal-flex {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .arsenal-card-item {
      background: #0F0F0E;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .btn-download-item {
      background: transparent;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: bold;
    }

    /* Constelación Visual */
    .constellation-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    .constellation-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .constellation-field {
      background: #0F0F0E;
      border: 1px dashed var(--border);
      border-radius: 8px;
      min-height: 140px;
      padding: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .backer-node {
      background: #1A2E22;
      border: 1px solid var(--success);
      padding: 6px 12px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      animation: fadeIn 0.3s ease-out;
    }

    .backer-node .dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--success);
    }

    .backer-node .tag {
      font-size: 0.8rem;
      color: var(--text-primary);
